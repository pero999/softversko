version: "3.8"

services:
  api:
    build: .
    container_name: menza-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/database.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Development s auto-reload
  api-dev:
    build: .
    container_name: menza-api-dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/database.db
      - DEBUG=true
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    profiles:
      - dev
